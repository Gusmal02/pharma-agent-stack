# deployment-cloudrun.yaml
# Despliegue en Google Cloud Run
# Comando para desplegar:
# gcloud run services replace deployment-cloudrun.yaml --region=us-central1

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: pharma-agent
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        # Escala a cero cuando no hay tráfico — ahorra créditos GCP
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "2"
        # Tiempo máximo de respuesta del agente
        run.googleapis.com/execution-environment: gen2
    spec:
      # Usuario no-root consistente con el Dockerfile
      serviceAccountName: pharma-agent-sa
      timeoutSeconds: 60
      containers:
      - image: gcr.io/TU_PROJECT_ID/pharma-agent:latest
        ports:
        - containerPort: 8080
        env:
        - name: GCP_PROJECT_ID
          value: "TU_PROJECT_ID"
        - name: GCP_REGION
          value: "us-central1"
        - name: GEMINI_MODEL
          value: "gemini-1.5-flash"
        # Secretos gestionados por Secret Manager — nunca en texto plano
        - name: GOOGLE_API_KEY
          valueFrom:
            secretKeyRef:
              name: google-api-key
              key: latest
        - name: VERTEX_INDEX_ID
          valueFrom:
            secretKeyRef:
              name: vertex-index-id
              key: latest
        - name: VERTEX_ENDPOINT_ID
          valueFrom:
            secretKeyRef:
              name: vertex-endpoint-id
              key: latest
        resources:
          limits:
            cpu: "1"
            memory: 512Mi